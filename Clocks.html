<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clocks — World Times &amp; Countdowns</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary:    #060a14;
    --bg-card:       rgba(15, 23, 42, 0.65);
    --bg-card-alt:   rgba(22, 33, 55, 0.55);
    --border-color:  rgba(56, 189, 248, 0.08);
    --border-glow:   rgba(56, 189, 248, 0.22);
    --text-primary:  #e2e8f0;
    --text-secondary:#94a3b8;
    --text-muted:    #64748b;
    --text-dim:      #475569;
    --accent:        #38bdf8;
    --accent-glow:   rgba(56, 189, 248, 0.35);
    --accent-green:  #34d399;
    --accent-amber:  #fbbf24;
    --accent-red:    #f87171;
    --accent-purple: #a78bfa;
    --alert-bg:      rgba(251, 191, 36, 0.06);
    --alert-border:  rgba(251, 191, 36, 0.4);
    --alert-text:    #fbbf24;
    --alert-glow:    rgba(251, 191, 36, 0.3);
    --completed-dot: #34d399;
    --upcoming-dot:  rgba(30, 41, 59, 0.6);
    --glass-blur:    blur(20px);
    --ring-size:     clamp(7rem, 14vmin, 14rem);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100vw; height: 100vh; overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
  }

  /* ── Background ── */
  .bg-mesh {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden; pointer-events: none;
  }
  .bg-mesh::before, .bg-mesh::after {
    content: ''; position: absolute;
    border-radius: 50%; filter: blur(120px); opacity: 0.25;
  }
  .bg-mesh::before {
    width: 55vw; height: 55vw;
    background: radial-gradient(circle, rgba(99,102,241,0.45), transparent 70%);
    top: -20%; left: -12%;
    animation: d1 25s ease-in-out infinite alternate;
  }
  .bg-mesh::after {
    width: 45vw; height: 45vw;
    background: radial-gradient(circle, rgba(14,165,233,0.38), transparent 70%);
    bottom: -18%; right: -8%;
    animation: d2 30s ease-in-out infinite alternate;
  }
  .bg-orb {
    position: absolute; width: 38vw; height: 38vw;
    border-radius: 50%; filter: blur(120px); opacity: 0.15;
    background: radial-gradient(circle, rgba(52,211,153,0.2), transparent 70%);
    top: 55%; left: 30%;
    animation: d3 22s ease-in-out infinite alternate;
  }
  @keyframes d1 { to { transform: translate(8vw, 5vh) scale(1.15); } }
  @keyframes d2 { to { transform: translate(-8vw, -4vh) scale(1.1); } }
  @keyframes d3 { to { transform: translate(6vw, -8vh) scale(0.9); } }

  .scanlines {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
  }

  /* ── Layout ── */
  .page {
    position: relative; z-index: 1;
    width: 100vw; height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
  }

  /* ── Top Bar ── */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.8vh 2vw;
    border-bottom: 1px solid var(--border-color);
    background: rgba(6,10,20,0.6);
    backdrop-filter: blur(16px);
  }
  .top-bar-left { display: flex; align-items: center; gap: 1vw; }
  .back-link {
    font-size: clamp(0.7rem, 1.2vmin, 1.1rem);
    color: var(--text-muted); text-decoration: none;
    padding: 0.3vh 0.6vw;
    border: 1px solid var(--border-color);
    border-radius: 0.4vmin;
    transition: all 0.3s ease;
    letter-spacing: 0.05vw;
  }
  .back-link:hover {
    color: var(--accent); border-color: var(--border-glow);
  }
  .page-title {
    font-size: clamp(1.2rem, 2.5vmin, 2.5rem);
    font-weight: 900; color: var(--accent);
    text-shadow: 0 0 30px var(--accent-glow);
    letter-spacing: 0.1vw;
  }
  .top-bar-right { display: flex; align-items: center; gap: 1.2vw; }
  .date-display {
    font-size: clamp(0.75rem, 1.3vmin, 1.2rem);
    color: var(--text-dim); font-weight: 600;
    letter-spacing: 0.1vw;
  }

  /* ── Main Content ── */
  .content {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
    gap: 1vh 1vw;
    padding: 1vh 1.5vw;
    overflow: hidden;
  }

  /* ── Hero Clocks Row ── */
  .hero-clocks {
    grid-column: 1 / -1;
    display: flex;
    gap: 1.5vw;
    justify-content: center;
    align-items: stretch;
  }
  .hero-clock-card {
    background: var(--bg-card);
    backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border-color);
    border-radius: 1vmin;
    padding: 1.5vh 2vw;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex: 1; max-width: 28vw;
    position: relative; overflow: hidden;
    box-shadow: 0 4px 30px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(56,189,248,0.04);
    animation: cardIn 0.7s ease-out both;
  }
  .hero-clock-card:nth-child(2) { animation-delay: 0.1s; }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .hero-clock-label {
    font-size: clamp(0.8rem, 1.4vmin, 1.3rem);
    text-transform: uppercase; letter-spacing: 0.3vw;
    color: var(--text-muted); font-weight: 700;
    margin-bottom: 0.3vh;
  }
  .hero-clock-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(3rem, 7vmin, 7rem);
    font-weight: 700; font-variant-numeric: tabular-nums;
    color: var(--text-primary); line-height: 1;
  }
  .hero-clock-time.utc { color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); }
  .hero-clock-date {
    font-size: clamp(0.7rem, 1.2vmin, 1.1rem);
    color: var(--text-dim); margin-top: 0.3vh;
    font-weight: 500;
  }

  /* ── Bottom Half: Countdowns + World Clocks ── */
  .bottom-half {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 1vw;
    overflow: hidden;
  }

  /* ── Countdown Panel ── */
  .countdown-panel {
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: 1vh;
  }
  .section-card {
    background: var(--bg-card);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border-color);
    border-radius: 1vmin;
    padding: 1.2vh 1vw;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    position: relative; overflow: hidden;
    transition: background 0.6s ease, border-color 0.6s ease, box-shadow 0.6s ease;
    box-shadow: 0 4px 30px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(56,189,248,0.04);
    animation: cardIn 0.7s ease-out both;
  }
  .section-label {
    font-size: clamp(0.7rem, 1.2vmin, 1.1rem);
    text-transform: uppercase; letter-spacing: 0.3vw;
    color: var(--text-muted); font-weight: 600;
  }
  .section-title {
    font-size: clamp(1.2rem, 2.5vmin, 2.5rem);
    font-weight: 800; color: var(--accent);
    text-shadow: 0 0 25px var(--accent-glow);
    letter-spacing: 0.05vw;
    margin-bottom: 0.1vh;
  }

  /* ── Countdown Ring ── */
  .countdown-ring-wrap {
    position: relative;
    width: var(--ring-size); height: var(--ring-size);
    display: flex; align-items: center; justify-content: center;
    margin: 0.3vh 0;
  }
  .countdown-ring {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }
  .ring-track  { fill: none; stroke: rgba(56,189,248,0.06); stroke-width: 3; }
  .ring-fill   {
    fill: none; stroke: var(--accent); stroke-width: 3.5;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.6s ease;
    filter: drop-shadow(0 0 8px var(--accent-glow));
  }
  .ring-glow   {
    fill: none; stroke: var(--accent); stroke-width: 7;
    stroke-linecap: round; opacity: 0.12;
    transition: stroke-dashoffset 1s linear, stroke 0.6s ease;
    filter: blur(4px);
  }
  .ring-fill.alert-ring, .ring-glow.alert-ring {
    stroke: var(--accent-amber);
    filter: drop-shadow(0 0 10px var(--alert-glow));
  }
  .countdown-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(2rem, 5vmin, 5rem);
    font-weight: 700; font-variant-numeric: tabular-nums;
    letter-spacing: 0.1vw; line-height: 1;
    color: var(--text-primary); z-index: 1;
    transition: color 0.6s ease, text-shadow 0.6s ease;
  }
  .next-label {
    font-size: clamp(0.7rem, 1.3vmin, 1.2rem);
    color: var(--text-muted); margin-bottom: 0.4vh;
  }
  .next-label span { color: var(--accent); font-weight: 700; }

  /* ── Progress Bar ── */
  .progress-track {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.03);
    border-radius: 0 0 1vmin 1vmin; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-green));
    border-radius: 0 2px 2px 0;
    transition: width 1s linear, background 0.6s ease;
    box-shadow: 0 0 8px rgba(56,189,248,0.3);
  }
  .progress-fill.alert-progress {
    background: linear-gradient(90deg, var(--accent-amber), var(--accent-red));
    box-shadow: 0 0 8px rgba(251,191,36,0.4);
  }

  /* ── Alert State ── */
  .section-card.alert-active {
    background: var(--alert-bg);
    border-color: var(--alert-border);
    box-shadow: 0 0 50px rgba(251,191,36,0.1), inset 0 0 0 1px rgba(251,191,36,0.12);
    animation: secPulse 2s ease-in-out infinite;
  }
  .section-card.alert-active .countdown-value {
    color: var(--alert-text);
    text-shadow: 0 0 25px var(--alert-glow), 0 0 50px rgba(251,191,36,0.15);
  }
  .section-card.alert-active .section-title {
    color: var(--alert-text);
    text-shadow: 0 0 20px var(--alert-glow);
  }
  @keyframes secPulse {
    0%, 100% { box-shadow: 0 0 35px rgba(251,191,36,0.08), inset 0 0 0 1px rgba(251,191,36,0.08); }
    50%      { box-shadow: 0 0 60px rgba(251,191,36,0.2), inset 0 0 0 1px rgba(251,191,36,0.18); }
  }

  /* ── Timeline Pips ── */
  .pip-row {
    display: flex; gap: 0.6vw;
    align-items: flex-start; margin-top: 0.3vh;
    position: relative;
  }
  .pip-row::before {
    content: ''; position: absolute;
    top: calc(clamp(0.25rem, 0.55vmin, 0.5rem));
    left: calc(clamp(0.25rem, 0.55vmin, 0.5rem));
    right: calc(clamp(0.25rem, 0.55vmin, 0.5rem));
    height: 2px;
    background: linear-gradient(90deg,
      rgba(52,211,153,0.4) 0%,
      rgba(71,85,105,0.3) 50%,
      rgba(30,41,59,0.2) 100%);
    z-index: 0; border-radius: 1px;
  }
  .pip {
    display: flex; flex-direction: column;
    align-items: center; gap: 0.2vh; z-index: 1;
  }
  .pip-dot {
    width: clamp(0.4rem, 0.9vmin, 0.85rem);
    height: clamp(0.4rem, 0.9vmin, 0.85rem);
    border-radius: 50%;
    background: var(--upcoming-dot);
    border: 2px solid var(--text-dim);
    transition: all 0.4s ease;
  }
  .pip-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(0.55rem, 1vmin, 0.95rem);
    color: var(--text-dim); font-variant-numeric: tabular-nums;
  }
  .pip.completed .pip-dot {
    background: var(--completed-dot); border-color: var(--completed-dot);
    box-shadow: 0 0 6px rgba(52,211,153,0.5);
  }
  .pip.completed .pip-time { color: var(--completed-dot); }
  .pip.current .pip-dot {
    background: var(--accent-amber); border-color: var(--accent-amber);
    box-shadow: 0 0 8px var(--accent-amber), 0 0 18px rgba(251,191,36,0.35);
    animation: pipPulse 1.5s ease-in-out infinite;
  }
  .pip.current .pip-time { color: var(--accent-amber); font-weight: 700; }
  @keyframes pipPulse {
    0%, 100% { box-shadow: 0 0 5px rgba(251,191,36,0.4), 0 0 12px rgba(251,191,36,0.15); }
    50%      { box-shadow: 0 0 12px rgba(251,191,36,0.9), 0 0 24px rgba(251,191,36,0.35); }
  }

  /* ── World Clocks Grid ── */
  .world-clocks {
    background: var(--bg-card);
    backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border-color);
    border-radius: 1vmin;
    padding: 1.2vh 1.2vw;
    overflow: hidden;
    box-shadow: 0 4px 30px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(56,189,248,0.04);
    animation: cardIn 0.7s ease-out both;
    animation-delay: 0.2s;
    display: flex; flex-direction: column;
  }
  .world-clocks-title {
    font-size: clamp(0.75rem, 1.3vmin, 1.2rem);
    text-transform: uppercase; letter-spacing: 0.25vw;
    color: var(--text-muted); font-weight: 700;
    margin-bottom: 0.8vh;
    padding-bottom: 0.5vh;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .world-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: 1fr 1fr;
    gap: 0.8vh 0.8vw;
    flex: 1;
  }
  .world-item {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.03);
    border-radius: 0.6vmin;
    padding: 0.8vh 0.6vw;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: all 0.3s ease;
  }
  .world-item:hover {
    border-color: rgba(56,189,248,0.12);
    background: rgba(255,255,255,0.04);
  }
  .world-iata {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(1.4rem, 2.8vmin, 2.8rem);
    font-weight: 800; color: var(--accent);
    letter-spacing: 0.1vw;
  }
  .world-city {
    font-size: clamp(0.75rem, 1.4vmin, 1.3rem);
    color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.05vw;
    margin-bottom: 0.2vh;
  }
  .world-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(2.2rem, 5vmin, 5rem);
    font-weight: 700; font-variant-numeric: tabular-nums;
    color: var(--text-primary);
    line-height: 1.1;
  }
  .world-date {
    font-size: clamp(0.75rem, 1.3vmin, 1.2rem);
    color: var(--text-dim);
    margin-top: 0.15vh;
  }
  .world-offset {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(0.75rem, 1.3vmin, 1.2rem);
    color: var(--text-muted);
  }

  /* ── Bottom Bar ── */
  .bottom-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.5vh 2vw;
    border-top: 1px solid var(--border-color);
    background: rgba(6,10,20,0.7);
    backdrop-filter: blur(12px);
    font-size: clamp(0.65rem, 1.1vmin, 1rem);
    color: var(--text-dim);
  }
  .bottom-bar a { color: var(--text-muted); text-decoration: none; }
  .bottom-bar a:hover { color: var(--accent); }
</style>
</head>
<body>
  <div class="bg-mesh"><div class="bg-orb"></div></div>
  <div class="scanlines"></div>

  <div class="page">
    <!-- ── Top Bar ── -->
    <div class="top-bar">
      <div class="top-bar-left">
        <a href="index.html" class="back-link">&larr; DASHBOARD</a>
        <span class="page-title">&#128368; CLOCKS</span>
      </div>
      <div class="top-bar-right">
        <span class="date-display" id="date-display">--</span>
      </div>
    </div>

    <!-- ── Content ── -->
    <div class="content">

      <!-- Hero: Local + UTC -->
      <div class="hero-clocks">
        <div class="hero-clock-card">
          <span class="hero-clock-label">Local Time</span>
          <span class="hero-clock-time" id="local-time">--:--:--</span>
          <span class="hero-clock-date" id="local-date">--</span>
        </div>
        <div class="hero-clock-card">
          <span class="hero-clock-label">UTC / Zulu</span>
          <span class="hero-clock-time utc" id="utc-time">--:--:--</span>
          <span class="hero-clock-date" id="utc-date">--</span>
        </div>
      </div>

      <!-- Bottom Half: Countdowns + World Clocks -->
      <div class="bottom-half">

        <!-- Countdown Panel -->
        <div class="countdown-panel">
          <div class="section-card" id="simba-section">
            <div class="section-label">Schedule</div>
            <div class="section-title">SIMBA</div>
            <div class="countdown-ring-wrap">
              <svg class="countdown-ring" viewBox="0 0 200 200">
                <circle class="ring-track" cx="100" cy="100" r="90"/>
                <circle class="ring-glow"  cx="100" cy="100" r="90" id="simba-ring-glow" stroke-dasharray="565.49" stroke-dashoffset="565.49"/>
                <circle class="ring-fill"  cx="100" cy="100" r="90" id="simba-ring"      stroke-dasharray="565.49" stroke-dashoffset="565.49"/>
              </svg>
              <div class="countdown-value" id="simba-countdown">--:--:--</div>
            </div>
            <div class="next-label">Next: <span id="simba-next">--:--</span></div>
            <div class="pip-row" id="simba-pips"></div>
            <div class="progress-track"><div class="progress-fill" id="simba-progress"></div></div>
          </div>

          <div class="section-card" id="field-section">
            <div class="section-label">Schedule</div>
            <div class="section-title">FIELD CONDITIONS</div>
            <div class="countdown-ring-wrap">
              <svg class="countdown-ring" viewBox="0 0 200 200">
                <circle class="ring-track" cx="100" cy="100" r="90"/>
                <circle class="ring-glow"  cx="100" cy="100" r="90" id="field-ring-glow" stroke-dasharray="565.49" stroke-dashoffset="565.49"/>
                <circle class="ring-fill"  cx="100" cy="100" r="90" id="field-ring"      stroke-dasharray="565.49" stroke-dashoffset="565.49"/>
              </svg>
              <div class="countdown-value" id="field-countdown">--:--:--</div>
            </div>
            <div class="next-label">Next: <span id="field-next">--:--</span></div>
            <div class="pip-row" id="field-pips"></div>
            <div class="progress-track"><div class="progress-fill" id="field-progress"></div></div>
          </div>
        </div>

        <!-- World Clocks -->
        <div class="world-clocks">
          <div class="world-clocks-title">World Airport Times</div>
          <div class="world-grid" id="world-grid"></div>
        </div>

      </div><!-- /bottom-half -->
    </div><!-- /content -->

    <!-- ── Bottom Bar ── -->
    <div class="bottom-bar">
      <span>Clocks &mdash; Fallback Time Reference &mdash; No Weather</span>
      <span><a href="index.html">Return to Dashboard</a></span>
    </div>
  </div><!-- /page -->

  <script>
    /* ═══════════════════════════════════════════════════════════════
       CLOCKS — World Times & SIMBA / Field Countdowns
       ═══════════════════════════════════════════════════════════════ */

    const $ = id => document.getElementById(id);
    function pad2(n) { return String(n).padStart(2, '0'); }

    // ── Schedules (24h local) ──
    const SIMBA = [[5,0],[8,0],[11,0],[14,0],[16,30],[20,0]];
    const FIELD = [[0,0],[6,0],[12,0],[18,0]];
    const ALERT_WINDOW_MS = 10 * 60 * 1000;
    const CIRC = 565.49;

    // ── World Airports ──
    const AIRPORTS = [
      { iata: 'JFK', city: 'New York',   tz: 'America/New_York' },
      { iata: 'LHR', city: 'London',     tz: 'Europe/London' },
      { iata: 'MAD', city: 'Madrid',     tz: 'Europe/Madrid' },
      { iata: 'DOH', city: 'Doha',       tz: 'Asia/Qatar' },
      { iata: 'SOF', city: 'Sofia',      tz: 'Europe/Sofia' },
      { iata: 'NRT', city: 'Tokyo',      tz: 'Asia/Tokyo' },
      { iata: 'AKL', city: 'Auckland',   tz: 'Pacific/Auckland' },
      { iata: 'LAX', city: 'Los Angeles', tz: 'America/Los_Angeles' },
      { iata: 'KOA', city: 'Kona',       tz: 'Pacific/Honolulu' },
      { iata: 'DEN', city: 'Denver',     tz: 'America/Denver' },
    ];

    // ── DOM Refs ──
    const simbaPips = $('simba-pips'), fieldPips = $('field-pips');
    const simbaSec  = $('simba-section'), fieldSec  = $('field-section');
    const simbaCD   = $('simba-countdown'), fieldCD   = $('field-countdown');
    const simbaNx   = $('simba-next'),  fieldNx   = $('field-next');
    const simbaRing = $('simba-ring'),  fieldRing = $('field-ring');
    const simbaGlow = $('simba-ring-glow'), fieldGlow = $('field-ring-glow');
    const simbaBar  = $('simba-progress'),  fieldBar  = $('field-progress');

    // ── Build World Grid ──
    const worldGrid = $('world-grid');
    AIRPORTS.forEach(ap => {
      const el = document.createElement('div');
      el.className = 'world-item';
      el.id = 'wc-' + ap.iata;
      el.innerHTML =
        '<span class="world-iata">' + ap.iata + '</span>' +
        '<span class="world-city">' + ap.city + '</span>' +
        '<span class="world-time" id="wt-' + ap.iata + '">--:--:--</span>' +
        '<span class="world-date" id="wd-' + ap.iata + '">--</span>' +
        '<span class="world-offset" id="wo-' + ap.iata + '">--</span>';
      worldGrid.appendChild(el);
    });

    // ── Helpers ──
    function fmtHHMM(h, m) { return pad2(h) + ':' + pad2(m); }

    function fmtCountdown(ms) {
      if (ms <= 0) return '00:00:00';
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      return pad2(h) + ':' + pad2(m) + ':' + pad2(s);
    }

    function buildTime(d, hm) {
      const t = new Date(d);
      t.setHours(hm[0], hm[1], 0, 0);
      return t;
    }

    // ── Build Pips ──
    function buildPips(container, schedule) {
      container.innerHTML = '';
      schedule.forEach(hm => {
        const pip = document.createElement('div');
        pip.className = 'pip';
        pip.innerHTML =
          '<div class="pip-dot"></div>' +
          '<div class="pip-time">' + fmtHHMM(hm[0], hm[1]) + '</div>';
        container.appendChild(pip);
      });
    }

    // ── Update Countdown Section ──
    function updateSection(now, sch, pips, secEl, cdEl, nxEl, ringEl, glowEl, progEl) {
      const today = [];
      sch.forEach(hm => today.push(buildTime(now, hm)));

      const pipEls = pips.querySelectorAll('.pip');
      let nextIdx = -1;
      for (let i = 0; i < today.length; i++) {
        pipEls[i].classList.remove('completed', 'current');
        if (now >= today[i]) {
          pipEls[i].classList.add('completed');
        } else if (nextIdx === -1) {
          nextIdx = i;
          pipEls[i].classList.add('current');
        }
      }

      let nextTime, prevTime;
      if (nextIdx === -1) {
        prevTime = today[today.length - 1];
        nextTime = new Date(today[0]);
        nextTime.setDate(nextTime.getDate() + 1);
      } else if (nextIdx === 0) {
        prevTime = new Date(today[today.length - 1]);
        prevTime.setDate(prevTime.getDate() - 1);
        nextTime = today[0];
      } else {
        prevTime = today[nextIdx - 1];
        nextTime = today[nextIdx];
      }

      const diff = nextTime - now;
      cdEl.textContent = fmtCountdown(diff);
      nxEl.textContent = fmtHHMM(nextTime.getHours(), nextTime.getMinutes());

      const totalInterval = nextTime - prevTime;
      const elapsed = now - prevTime;
      const ratio = Math.max(0, Math.min(1, elapsed / totalInterval));
      const offset = CIRC * (1 - ratio);
      ringEl.style.strokeDashoffset = offset;
      glowEl.style.strokeDashoffset = offset;
      progEl.style.width = (ratio * 100) + '%';

      const isAlert = diff <= ALERT_WINDOW_MS && diff > 0;
      secEl.classList.toggle('alert-active', isAlert);
      ringEl.classList.toggle('alert-ring', isAlert);
      glowEl.classList.toggle('alert-ring', isAlert);
      progEl.classList.toggle('alert-progress', isAlert);
    }

    // ── Format TZ time ──
    function tzTime(tz) {
      const now = new Date();
      const parts = new Intl.DateTimeFormat('en-GB', {
        timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      }).formatToParts(now);
      const h = parts.find(p => p.type === 'hour').value;
      const m = parts.find(p => p.type === 'minute').value;
      const s = parts.find(p => p.type === 'second').value;
      return h + ':' + m + ':' + s;
    }

    function tzDate(tz) {
      return new Intl.DateTimeFormat('en-US', {
        timeZone: tz, weekday: 'short', day: '2-digit', month: 'short'
      }).format(new Date());
    }

    function tzOffset(tz) {
      const now = new Date();
      const formatter = new Intl.DateTimeFormat('en-US', {
        timeZone: tz, timeZoneName: 'shortOffset'
      });
      const tzParts = formatter.formatToParts(now);
      const tzName = tzParts.find(p => p.type === 'timeZoneName');
      return tzName ? tzName.value : '';
    }

    // ── Master Tick ──
    const DAYS  = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

    function tick() {
      const now = new Date();

      // Local
      $('local-time').textContent = pad2(now.getHours()) + ':' + pad2(now.getMinutes()) + ':' + pad2(now.getSeconds());
      $('local-date').textContent = DAYS[now.getDay()] + ' ' + pad2(now.getDate()) + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();

      // UTC
      $('utc-time').textContent = pad2(now.getUTCHours()) + ':' + pad2(now.getUTCMinutes()) + ':' + pad2(now.getUTCSeconds());
      $('utc-date').textContent = DAYS[now.getUTCDay()] + ' ' + pad2(now.getUTCDate()) + ' ' + MONTHS[now.getUTCMonth()] + ' ' + now.getUTCFullYear();

      // Top bar date
      $('date-display').textContent = DAYS[now.getDay()] + ' ' + pad2(now.getDate()) + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();

      // Countdowns
      updateSection(now, SIMBA, simbaPips, simbaSec, simbaCD, simbaNx, simbaRing, simbaGlow, simbaBar);
      updateSection(now, FIELD, fieldPips, fieldSec, fieldCD, fieldNx, fieldRing, fieldGlow, fieldBar);

      // World clocks
      AIRPORTS.forEach(ap => {
        $('wt-' + ap.iata).textContent = tzTime(ap.tz);
        $('wd-' + ap.iata).textContent = tzDate(ap.tz);
        $('wo-' + ap.iata).textContent = tzOffset(ap.tz);
      });
    }

    // ── Init ──
    buildPips(simbaPips, SIMBA);
    buildPips(fieldPips, FIELD);
    tick();
    setInterval(tick, 1000);

    // ── Stability Watchdogs ──
    const pageLoadTime = Date.now();
    const AUTO_RELOAD_MS = 12 * 60 * 60 * 1000;

    setInterval(function() {
      if (Date.now() - pageLoadTime >= AUTO_RELOAD_MS) location.reload();
    }, 60000);

    document.addEventListener('visibilitychange', function() {
      if (!document.hidden) tick();
    });

    window.addEventListener('error', function(e) {
      console.error('Uncaught:', e.message);
      window.__errCount = (window.__errCount || 0) + 1;
      if (window.__errCount >= 3) setTimeout(function() { location.reload(); }, 5000);
    });

    window.addEventListener('unhandledrejection', function(e) {
      console.error('Unhandled rejection:', e.reason);
      e.preventDefault();
    });
  </script>
</body>
</html>
